<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>ZedTV Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
:root{
  --bg:#030f11; --bg2:#051E22;
  --cyan:#30E9FE; --cyan2:#1ab8cc;
  --glass:rgba(48,233,254,0.07);
  --glass-b:rgba(48,233,254,0.18);
  --text:#e8f8fa; --dim:#7ab8c0;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#000;color:var(--text);font-family:'DM Sans',sans-serif;}

#wrap{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;}
#vid{width:100%;height:100%;object-fit:contain;background:#000;}

/* OVERLAY */
#ov{position:fixed;inset:0;z-index:10;pointer-events:none;transition:opacity .3s;}
#ov.hidden{opacity:0;}
#ov.on{pointer-events:auto;opacity:1;}

/* TOP */
.tbar{position:absolute;top:0;left:0;right:0;background:linear-gradient(to bottom,rgba(0,0,0,.92) 0%,transparent 100%);}
.tbar-inner{display:flex;align-items:center;gap:11px;padding:16px 14px 44px;}
.back{width:40px;height:40px;border-radius:50%;background:rgba(5,30,34,.8);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);flex-shrink:0;}
.back:active{transform:scale(.9);}
.back i{font-size:16px;}
.chlogo{width:40px;height:40px;border-radius:10px;background:#0a2530;border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.chlogo img{width:86%;height:86%;object-fit:contain;}
.chinfo{flex:1;min-width:0;}
.chname{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chgrp{font-size:10px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.livebadge{background:linear-gradient(135deg,#ff3b5c,#d42549);color:#fff;font-size:9px;font-weight:800;padding:4px 10px;border-radius:50px;letter-spacing:1px;flex-shrink:0;display:flex;align-items:center;gap:5px;}
.ldot{width:5px;height:5px;border-radius:50%;background:#fff;animation:lp 1.6s infinite;}
@keyframes lp{0%,100%{opacity:1;}50%{opacity:.3;}}

/* CENTER */
.cctrl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:20px;}
.cbtn{width:52px;height:52px;border-radius:50%;background:rgba(3,15,17,.7);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);}
.cbtn i{font-size:18px;}
.cbtn:active{transform:scale(.88);}
.cbtn.main{width:72px;height:72px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));border:none;box-shadow:0 0 32px rgba(48,233,254,.32);}
.cbtn.main i{color:#051E22;font-size:30px;}

/* BOTTOM */
.bbar{position:absolute;bottom:0;left:0;right:0;padding:50px 16px 20px;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,transparent 100%);}
.liveline{margin-bottom:16px;}
.liverow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.liveleft{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);}
.liveleft .d{width:6px;height:6px;border-radius:50%;background:#ff3b5c;animation:lp 1.6s infinite;}
.timestr{font-size:11px;color:var(--dim);}
.ltrack{height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.lfill{height:100%;background:linear-gradient(to right,var(--cyan),var(--cyan2));border-radius:3px;animation:lf 2.5s ease-in-out infinite alternate;}
@keyframes lf{from{opacity:.55;}to{opacity:1;}}
.arow{display:flex;align-items:center;justify-content:space-between;}
.aleft{display:flex;align-items:center;gap:16px;}
.abtn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 5px;}
.abtn i{font-size:19px;}
.abtn span{font-size:9px;color:var(--dim);font-weight:500;letter-spacing:.3px;}
.abtn:active{transform:scale(.88);}
.abtn.bm i{color:var(--cyan);}
.aright{display:flex;align-items:center;gap:8px;}
.qpill{background:rgba(48,233,254,.08);border:1px solid var(--glass-b);padding:5px 12px;border-radius:8px;font-size:10px;color:var(--cyan);font-weight:700;letter-spacing:.5px;cursor:pointer;}
.qpill:active{transform:scale(.92);}
.fsbtn{width:36px;height:36px;border-radius:10px;background:rgba(48,233,254,.06);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.fsbtn i{font-size:14px;color:var(--dim);}
.fsbtn:active{transform:scale(.9);}

/* LOADING */
#ls{position:fixed;inset:0;z-index:50;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s;}
#ls.gone{opacity:0;pointer-events:none;}
.llogo{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;background:linear-gradient(135deg,#fff 30%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lring{position:relative;width:52px;height:52px;}
.lring svg{position:absolute;inset:0;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.rt{fill:none;stroke:rgba(48,233,254,.1);stroke-width:3;}
.ra{fill:none;stroke:var(--cyan);stroke-width:3;stroke-linecap:round;stroke-dasharray:78 122;}
.lch{font-size:13px;color:var(--dim);text-align:center;max-width:220px;line-height:1.5;}
.lstep{font-size:11px;color:rgba(48,233,254,.4);margin-top:-6px;}

/* ERROR */
#es{position:fixed;inset:0;z-index:40;background:var(--bg2);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;}
#es.on{display:flex;}
.eico{width:80px;height:80px;border-radius:50%;background:rgba(48,233,254,.05);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
.eico i{font-size:32px;color:rgba(48,233,254,.35);}
.etitle{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;text-align:center;}
.esub{font-size:13px;color:var(--dim);text-align:center;max-width:264px;line-height:1.6;}
.ecode{font-size:10px;color:rgba(48,233,254,.3);font-family:monospace;text-align:center;max-width:260px;word-break:break-all;margin-top:-4px;}
.ebtns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;margin-top:6px;}
.ebtn1{width:100%;padding:14px;border-radius:50px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#051E22;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.ebtn1:active{transform:scale(.96);}
.ebtn2{width:100%;padding:13px;border-radius:50px;background:var(--glass);border:1px solid var(--glass-b);color:var(--text);font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.ebtn2:active{transform:scale(.96);}
.eback{font-size:13px;color:var(--dim);cursor:pointer;margin-top:2px;}

/* TOAST */
#toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(3,15,17,.94);border:1px solid var(--glass-b);color:var(--text);font-size:13px;padding:10px 22px;border-radius:50px;z-index:200;opacity:0;transition:all .3s;backdrop-filter:blur(14px);white-space:nowrap;pointer-events:none;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="ls">
  <div class="llogo">ZedTV</div>
  <div class="lring"><svg viewBox="0 0 52 52"><circle class="rt" cx="26" cy="26" r="22"/><circle class="ra" cx="26" cy="26" r="22"/></svg></div>
  <div class="lch" id="lch">Connecting…</div>
  <div class="lstep" id="lstep"></div>
</div>

<div id="es">
  <div class="eico"><i class="fas fa-satellite-dish"></i></div>
  <div class="etitle">Stream Unavailable</div>
  <div class="esub">Channel may be offline, geo-blocked, or the play token has expired.</div>
  <div class="ecode" id="ecode"></div>
  <div class="ebtns">
    <button class="ebtn1" onclick="retryAll()"><i class="fas fa-rotate-right"></i> Retry All Methods</button>
    <button class="ebtn2" onclick="tryDirect()"><i class="fas fa-play"></i> Try Direct (No Proxy)</button>
  </div>
  <div class="eback" onclick="goBack()">← Back to channels</div>
</div>

<div id="wrap"><video id="vid" playsinline autoplay webkit-playsinline></video></div>

<div id="ov" class="on" onclick="ovTap(event)">
  <div class="tbar">
    <div class="tbar-inner">
      <div class="back" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
      <div class="chlogo" id="chlogo"><i class="fas fa-tv" style="color:var(--cyan);font-size:14px;"></i></div>
      <div class="chinfo">
        <div class="chname" id="chname">Loading…</div>
        <div class="chgrp" id="chgrp"></div>
      </div>
      <div class="livebadge"><div class="ldot"></div>LIVE</div>
    </div>
  </div>

  <div class="cctrl">
    <div class="cbtn" onclick="seekLive()" title="Jump to live edge"><i class="fas fa-rotate-right"></i></div>
    <div class="cbtn main" onclick="togglePlay()"><i class="fas fa-pause" id="pico"></i></div>
    <div class="cbtn" onclick="nextMethod()" title="Try next method"><i class="fas fa-shuffle"></i></div>
  </div>

  <div class="bbar">
    <div class="liveline">
      <div class="liverow">
        <div class="liveleft"><div class="d"></div><span>LIVE</span></div>
        <span class="timestr" id="tdisp">--:--</span>
      </div>
      <div class="ltrack"><div class="lfill"></div></div>
    </div>
    <div class="arow">
      <div class="aleft">
        <div class="abtn" id="bmbtn" onclick="toggleBookmark()"><i class="fas fa-bookmark"></i><span>Save</span></div>
        <div class="abtn" onclick="seekLive()"><i class="fas fa-arrows-rotate"></i><span>Live</span></div>
        <div class="abtn" onclick="shareChannel()"><i class="fas fa-share-nodes"></i><span>Share</span></div>
      </div>
      <div class="aright">
        <div class="qpill" id="qbadge" onclick="nextMethod()">AUTO</div>
        <div class="fsbtn" onclick="toggleFS()"><i class="fas fa-expand" id="fsico"></i></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── PARAMS ──
const P     = new URLSearchParams(location.search);
const chName  = P.get('name')  || 'Unknown';
const chLogo  = P.get('logo')  || '';
const chGroup = P.get('group') || '';
const chUrl   = P.get('url')   || '';

const cleanName  = chName.replace(/[┃│]/g,'').trim();
const cleanGroup = chGroup.replace(/[┃│]/g,'').trim();

// ── STATE ──
let shaka   = null;
let hls     = null;
let ovTimer = null;
let ovOn    = true;
let mIdx    = 0;
let isFS    = false;
let ttimer;
let saved   = JSON.parse(localStorage.getItem('zedtv_saved') || '[]');

const vid = document.getElementById('vid');

// ── PROXY HELPERS ──
const proxy     = u  => '/proxy?url=' + encodeURIComponent(u);
const logoProxy = u  => u ? '/proxy?url=' + encodeURIComponent(u) + '&type=logo' : '';

// ── BUILD METHOD LIST ──
// Stalker portal uses play_token which expires — we try multiple strategies
function buildMethods(url) {
  const p    = proxy(url);
  // Also try with m3u8 extension — some Stalker portals serve HLS manifests
  const m3u8 = proxy(url.replace('extension=ts','extension=m3u8'));
  return [
    { label:'Proxy → HLS.js',        url: p,    eng:'hlsjs'  },
    { label:'Proxy → Shaka',         url: p,    eng:'shaka'  },
    { label:'Proxy HLS → HLS.js',    url: m3u8, eng:'hlsjs'  },
    { label:'Proxy HLS → Shaka',     url: m3u8, eng:'shaka'  },
    { label:'Proxy → Native',        url: p,    eng:'native' },
    { label:'Direct → HLS.js',       url: url,  eng:'hlsjs'  },
    { label:'Direct → Native',       url: url,  eng:'native' },
  ];
}
const METHODS = buildMethods(chUrl);

// ── UI INIT ──
document.getElementById('chname').textContent = cleanName;
document.getElementById('chgrp').textContent  = cleanGroup;
document.getElementById('lch').textContent    = cleanName;

// Logo: proxy through our backend to bypass port-blocked picon servers
const av = `https://ui-avatars.com/api/?name=${encodeURIComponent(cleanName.substring(0,2))}&background=0a2530&color=30E9FE&size=64&bold=true`;
const lw = document.getElementById('chlogo');
if (chLogo) {
  // Use our proxy for logos (picon.tivi-ott.net:25461 is blocked by browsers)
  const proxiedLogo = logoProxy(chLogo);
  lw.innerHTML = `<img src="${proxiedLogo}" onerror="this.src='${av}'" style="width:86%;height:86%;object-fit:contain"/>`;
} else {
  lw.innerHTML = `<img src="${av}" style="width:86%;height:86%;object-fit:contain"/>`;
}

updateBM();
startClock();
schedHide();

// ── ENGINE: DESTROY ALL ──
async function killAll() {
  if (shaka) { try { await shaka.destroy(); } catch(e){} shaka = null; }
  if (hls)   { try { hls.destroy(); }        catch(e){} hls   = null; }
  vid.pause();
  vid.removeAttribute('src');
  try { vid.load(); } catch(e){}
}

// ── TRY METHOD N ──
async function tryMethod(idx) {
  if (idx >= METHODS.length) {
    showErr(`All ${METHODS.length} methods failed — stream may be offline or token expired`);
    return;
  }
  mIdx = idx;
  const m = METHODS[idx];
  document.getElementById('lstep').textContent = `Method ${idx+1}/${METHODS.length}: ${m.label}`;
  console.log('[ZedTV]', m.label, '→', m.url.substring(0,90));

  await killAll();

  if      (m.eng === 'shaka')  tryShaka(m);
  else if (m.eng === 'hlsjs')  tryHlsJs(m);
  else                          tryNative(m);
}

// ── SHAKA ──
async function tryShaka(m) {
  try {
    if (typeof shaka === 'undefined' || !window.shaka) { tryMethod(mIdx+1); return; }
    const S = window.shaka;
    S.polyfill.installAll();
    if (!S.Player.isBrowserSupported()) { tryMethod(mIdx+1); return; }

    shaka = new S.Player();
    await shaka.attach(vid);
    shaka.configure({
      streaming: {
        bufferingGoal: 30,
        rebufferingGoal: 2,
        retryParameters: { maxAttempts: 2, baseDelay: 1000 }
      },
      manifest: { retryParameters: { maxAttempts: 2 } }
    });
    shaka.getNetworkingEngine().registerRequestFilter((type, req) => {
      req.headers['User-Agent'] = 'Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36 Chrome/120 Mobile Safari/537.36';
    });
    shaka.addEventListener('error', e => {
      console.warn('[Shaka] err', e.detail?.code);
      tryMethod(mIdx + 1);
    });
    await shaka.load(m.url);
    onSuccess('Shaka');
  } catch(e) {
    console.warn('[Shaka] threw:', e.message || e);
    tryMethod(mIdx + 1);
  }
}

// ── HLS.JS ──
function tryHlsJs(m) {
  if (!Hls.isSupported()) { tryMethod(mIdx+1); return; }
  hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    maxBufferLength: 60,
    liveSyncDurationCount: 3,
    liveMaxLatencyDurationCount: 10,
    manifestLoadingMaxRetry: 2,
    levelLoadingMaxRetry: 2,
    fragLoadingMaxRetry: 4,
    xhrSetup(xhr) {
      xhr.setRequestHeader('User-Agent','Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36 Chrome/120 Mobile Safari/537.36');
    }
  });
  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    const lvls = hls.levels;
    if (lvls.length) {
      const h = lvls[lvls.length-1]?.height;
      if (h) document.getElementById('qbadge').textContent = h + 'p';
    }
    onSuccess('HLS.js');
  });
  hls.on(Hls.Events.LEVEL_SWITCHED, (e,d) => {
    const l = hls.levels[d.level];
    if (l?.height) document.getElementById('qbadge').textContent = l.height + 'p';
  });
  hls.on(Hls.Events.ERROR, (e,d) => {
    if (d.fatal) { console.warn('[HLS.js] fatal', d.type, d.details); tryMethod(mIdx+1); }
  });
  hls.loadSource(m.url);
  hls.attachMedia(vid);
}

// ── NATIVE ──
function tryNative(m) {
  let done = false;
  function settle(ok) {
    if (done) return; done = true;
    vid.removeEventListener('loadeddata', onOk);
    vid.removeEventListener('error', onErr);
    clearTimeout(nativeTimer);
    if (ok) onSuccess('Native'); else tryMethod(mIdx+1);
  }
  const onOk  = () => settle(true);
  const onErr = () => settle(false);
  vid.addEventListener('loadeddata', onOk,  { once:true });
  vid.addEventListener('error',      onErr, { once:true });
  vid.src = m.url;
  vid.load();
  const nativeTimer = setTimeout(() => { if (vid.readyState < 2) settle(false); }, 9000);
}

// ── SUCCESS ──
function onSuccess(eng) {
  document.getElementById('ls').classList.add('gone');
  document.getElementById('es').classList.remove('on');
  document.getElementById('pico').className = 'fas fa-pause';
  vid.play().catch(()=>{});
  schedHide();
  toast('▶ Playing via ' + eng);
}

// ── ERROR ──
function showErr(detail) {
  document.getElementById('ls').classList.add('gone');
  document.getElementById('es').classList.add('on');
  document.getElementById('ecode').textContent = detail || '';
}

// ── RETRY ──
function retryAll() {
  document.getElementById('es').classList.remove('on');
  document.getElementById('ls').classList.remove('gone');
  tryMethod(0);
}
function nextMethod() {
  const n = mIdx + 1;
  if (n >= METHODS.length) { toast('No more methods to try'); return; }
  document.getElementById('ls').classList.remove('gone');
  document.getElementById('es').classList.remove('on');
  toast(`↪ Method ${n+1}/${METHODS.length}`);
  tryMethod(n);
}
function tryDirect() {
  const idx = METHODS.findIndex(m => m.label.startsWith('Direct'));
  document.getElementById('es').classList.remove('on');
  document.getElementById('ls').classList.remove('gone');
  tryMethod(idx >= 0 ? idx : 5);
}

// ── CONTROLS ──
function togglePlay() {
  if (vid.paused) { vid.play().catch(()=>{}); document.getElementById('pico').className='fas fa-pause'; }
  else            { vid.pause();               document.getElementById('pico').className='fas fa-play'; }
  resetOvTimer();
}

function seekLive() {
  if (hls) {
    hls.stopLoad();
    setTimeout(() => { hls.startLoad(); vid.play().catch(()=>{}); }, 200);
  } else if (shaka) {
    const el = shaka.getMediaElement();
    if (el && isFinite(el.duration)) el.currentTime = el.duration - 0.5;
    vid.play().catch(()=>{});
  } else {
    vid.load(); vid.play().catch(()=>{});
  }
  toast('⏩ Live edge');
  resetOvTimer();
}

// ── OVERLAY ──
function ovTap(e) {
  if (e.target !== document.getElementById('ov')) return;
  ovOn ? schedHide() : showOv();
}
function showOv() {
  const o = document.getElementById('ov');
  o.classList.remove('hidden'); o.classList.add('on');
  ovOn = true; schedHide();
}
function schedHide() {
  clearTimeout(ovTimer);
  ovTimer = setTimeout(() => {
    const o = document.getElementById('ov');
    o.classList.add('hidden'); o.classList.remove('on');
    ovOn = false;
  }, 4000);
}
function resetOvTimer() { if (ovOn) schedHide(); }

vid.addEventListener('click', e => {
  e.stopPropagation();
  ovOn ? (togglePlay(), schedHide()) : showOv();
});

// Double-tap = seek live
let lastTap = 0;
vid.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 280) { seekLive(); e.preventDefault(); }
  lastTap = now;
});

// ── FULLSCREEN ──
function toggleFS() {
  const el = document.documentElement;
  if (!isFS) (el.requestFullscreen || el.webkitRequestFullscreen || (()=>{})).call(el).catch(()=>{});
  else       (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document);
}
['fullscreenchange','webkitfullscreenchange'].forEach(ev => {
  document.addEventListener(ev, () => {
    isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
    document.getElementById('fsico').className = isFS ? 'fas fa-compress' : 'fas fa-expand';
  });
});

// ── BOOKMARK ──
function toggleBookmark() {
  const i = saved.findIndex(s => s.url === chUrl);
  if (i >= 0) { saved.splice(i,1); toast('Removed from saved'); }
  else        { saved.push({name:chName,logo:chLogo,group:chGroup,url:chUrl}); toast('⭐ Saved!'); }
  localStorage.setItem('zedtv_saved', JSON.stringify(saved));
  updateBM();
}
function updateBM() {
  const b = document.getElementById('bmbtn');
  const is = saved.some(s => s.url === chUrl);
  b.classList.toggle('bm', is);
  b.querySelector('span').textContent = is ? 'Saved' : 'Save';
}

// ── SHARE ──
function shareChannel() {
  if (navigator.share) navigator.share({ title: cleanName + ' – ZedTV', url: location.href });
  else navigator.clipboard?.writeText(location.href).then(() => toast('🔗 Copied!'));
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(ttimer);
  ttimer = setTimeout(() => t.classList.remove('on'), 2400);
}

// ── CLOCK ──
function startClock() {
  const tick = () => {
    const n = new Date();
    document.getElementById('tdisp').textContent =
      n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
  };
  tick(); setInterval(tick, 30000);
}

function goBack() { window.location.href = 'index.html'; }

window.screen?.orientation?.lock?.('landscape').catch(()=>{});

// ── START ──
if (chUrl) tryMethod(0);
else { document.getElementById('ls').classList.add('gone'); showErr('No stream URL provided'); }
</script>
